# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Flutter, NestJS, SQLite, PostgreSQL
  Architecture: Clean Architecture, Hexagonal, Tactic DDD
  Testing: Jest (unit/e2e) for admin_backend, flutter_test (unit/widget) for pos_app
  Style: Conventional Commits, ESLint + Prettier (NestJS), flutter_lints (Flutter)

strict_tdd: true

testing:
  admin_backend:
    runner: jest
    command: npm test
    coverage: npm run test:cov
    e2e: npm run test:e2e
    lint: npm run lint
    build: npm run build
    formatter: npm run format
  pos_app:
    runner: flutter_test
    command: flutter test
    coverage: flutter test --coverage
    lint: flutter analyze
    codegen: flutter pub run build_runner build --delete-conflicting-outputs
    build_smoke: flutter build web

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
  design:
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
  apply:
    - Follow existing code patterns and conventions
  verify:
    - Run tests if test infrastructure exists
  archive:
    - Warn before merging destructive deltas
