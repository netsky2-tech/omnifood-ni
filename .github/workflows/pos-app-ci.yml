name: POS App CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/pos_app/**'
      - '.github/workflows/pos-app-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/pos_app/**'
      - '.github/workflows/pos-app-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/pos_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.8'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          cache-path: '${{ runner.tool_cache }}/flutter'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze project source
        run: flutter analyze

      - name: Fail on focused tests (test.only / group.only)
        # Lightweight gate: a focused test (test.only/group.only) would mask
        # the full suite and let `flutter test --coverage` pass green in CI
        # while skipping almost every test. Fail fast before running tests.
        run: |
          if grep -rnE '\b(test|group)\.only\(' test/; then
            echo "::error::Focused tests (test.only/group.only) are forbidden in CI. Remove the .only marker."
            exit 1
          fi
          echo "No focused tests found."

      - name: Run tests
        run: flutter test --coverage

  build-check:
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/pos_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.8'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Smoke Test
        run: flutter build web
