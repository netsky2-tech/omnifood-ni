name: Admin Backend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/admin_backend/**"
      - ".github/workflows/admin-backend-ci.yml"
  pull_request:
    branches:
      - main
      - "feat/**"
    paths:
      - "apps/admin_backend/**"
      - ".github/workflows/admin-backend-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin_backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: omnifood
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/admin_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Fail on focused tests (it.only / describe.only)
        # Match the POS app safeguard: focused backend tests would let CI go
        # green while skipping most of the Nest suite.
        run: |
          if grep -rnE '\b(it|test|describe)(\.concurrent)?\.only\(|\b(fit|fdescribe)\(' src/ test/; then
            echo "::error::Focused tests (it.only/test.only/describe.only/fit/fdescribe) are forbidden in CI. Remove the focused marker."
            exit 1
          fi
          echo "No focused tests found."

      - name: Run unit tests
        run: npm test

      - name: Run DB-backed migration tests
        run: npm run test:db
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: admin
          DB_DATABASE: omnifood

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: admin
          DB_DATABASE: omnifood
          JWT_SECRET: test-secret

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/admin_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
