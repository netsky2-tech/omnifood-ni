name: Admin Backend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/admin_backend/**"
      - ".github/workflows/admin-backend-ci.yml"
  pull_request:
    branches:
      - main
      - "feat/**"
    paths:
      - "apps/admin_backend/**"
      - ".github/workflows/admin-backend-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: test-only-jwt-secret-with-at-least-thirty-two-bytes
      JWT_ISSUER: omnifood-admin
      JWT_AUDIENCE: omnifood-pos
      JWT_ACCESS_TTL_SECONDS: 3600
      JWT_REFRESH_TTL_SECONDS: 604800
      JWT_CLOCK_TOLERANCE_SECONDS: 5
      JWT_ALGORITHM: HS256

    defaults:
      run:
        working-directory: apps/admin_backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: omnifood
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/admin_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Fail on focused tests (it.only / describe.only)
        run: npm run test:no-only

      - name: Run unit tests
        run: npm test

      - name: Run DB-backed migration tests
        run: npm run test:db
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: admin
          DB_DATABASE: omnifood

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: admin
          DB_DATABASE: omnifood

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: test-only-jwt-secret-with-at-least-thirty-two-bytes
      JWT_ISSUER: omnifood-admin
      JWT_AUDIENCE: omnifood-pos
      JWT_ACCESS_TTL_SECONDS: 3600
      JWT_REFRESH_TTL_SECONDS: 604800
      JWT_CLOCK_TOLERANCE_SECONDS: 5
      JWT_ALGORITHM: HS256

    defaults:
      run:
        working-directory: apps/admin_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/admin_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
