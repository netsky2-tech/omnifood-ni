name: Admin Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/admin_backend/**'
      - '.github/workflows/admin-backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/admin_backend/**'
      - '.github/workflows/admin-backend-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/admin_backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: omnifood
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/admin_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: admin
          DB_DATABASE: omnifood
          JWT_SECRET: test-secret

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/admin_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/admin_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
